services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garageon-app
    restart: unless-stopped
    working_dir: /var/www/html
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-garageon}
      DB_USERNAME: ${DB_USERNAME:-garageon}
      DB_PASSWORD: ${DB_PASSWORD:-garageon}
      EVOLUTION_GO_URL: http://evolution-go:8080
      EVOLUTION_GO_WEBHOOK_BASE_URL: ${EVOLUTION_GO_WEBHOOK_BASE_URL:-http://nginx}
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - garageon

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garageon-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --timeout=90
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: ${DB_DATABASE:-garageon}
      DB_USERNAME: ${DB_USERNAME:-garageon}
      DB_PASSWORD: ${DB_PASSWORD:-garageon}
      EVOLUTION_GO_URL: http://evolution-go:8080
      EVOLUTION_GO_WEBHOOK_BASE_URL: ${EVOLUTION_GO_WEBHOOK_BASE_URL:-http://nginx}
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - garageon

  nginx:
    image: nginx:1.27-alpine
    container_name: garageon-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8001}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/snippets:/etc/nginx/snippets
      - certbot-webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    depends_on:
      - app
    networks:
      - garageon

  mysql:
    image: mysql:8.4
    container_name: garageon-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-garageon}
      MYSQL_USER: ${MYSQL_USER:-garageon}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-garageon}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-garageon_root}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u${MYSQL_USER:-garageon}", "-p${MYSQL_PASSWORD:-garageon}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - garageon

  evolution-postgres:
    image: postgres:15-alpine
    container_name: garageon-evolution-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${EVOLUTION_POSTGRES_DB:-evolution_go}
      POSTGRES_USER: ${EVOLUTION_POSTGRES_USER:-evolution}
      POSTGRES_PASSWORD: ${EVOLUTION_POSTGRES_PASSWORD:-evolution}
    volumes:
      - evolution-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${EVOLUTION_POSTGRES_USER:-evolution} -d ${EVOLUTION_POSTGRES_DB:-evolution_go}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - garageon

  evolution-go:
    image: evoapicloud/evolution-go:latest
    container_name: garageon-evolution-go
    restart: unless-stopped
    ports:
      - "${EVOLUTION_GO_PORT:-8080}:8080"
    environment:
      SERVER_PORT: 8080
      CLIENT_NAME: evolution
      GLOBAL_API_KEY: ${EVOLUTION_GO_API_KEY}
      POSTGRES_AUTH_DB: postgresql://${EVOLUTION_POSTGRES_USER:-evolution}:${EVOLUTION_POSTGRES_PASSWORD:-evolution}@evolution-postgres:5432/${EVOLUTION_POSTGRES_DB:-evolution_go}?sslmode=disable
      POSTGRES_USERS_DB: postgresql://${EVOLUTION_POSTGRES_USER:-evolution}:${EVOLUTION_POSTGRES_PASSWORD:-evolution}@evolution-postgres:5432/${EVOLUTION_POSTGRES_DB:-evolution_go}?sslmode=disable
      DATABASE_SAVE_MESSAGES: "false"
      CONNECT_ON_STARTUP: "true"
      WEBHOOKFILES: "true"
      WADEBUG: INFO
      LOGTYPE: console
    depends_on:
      evolution-postgres:
        condition: service_healthy
    networks:
      - garageon

  certbot:
    image: certbot/certbot:v2.11.0
    container_name: garageon-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    networks:
      - garageon

networks:
  garageon:
    driver: bridge

volumes:
  mysql-data:
  evolution-postgres-data:
  certbot-webroot:
  letsencrypt:
