services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garageon-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - garageon

  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: garageon-queue
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan queue:work --tries=3 --timeout=90
    volumes:
      - ./:/var/www/html
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - garageon

  nginx:
    image: nginx:1.27-alpine
    container_name: garageon-nginx
    restart: unless-stopped
    ports:
      - "${HTTP_PORT:-8001}:80"
      - "${HTTPS_PORT:-443}:443"
    volumes:
      - ./:/var/www/html:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d
      - ./docker/nginx/snippets:/etc/nginx/snippets
      - certbot-webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    depends_on:
      - app
    networks:
      - garageon

  mysql:
    image: mysql:8.4
    container_name: garageon-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${MYSQL_DATABASE:-garageon}
      MYSQL_USER: ${MYSQL_USER:-garageon}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-garageon}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-garageon_root}
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-p${DB_ROOT_PASSWORD:-garageon_root}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - garageon

  certbot:
    image: certbot/certbot:v2.11.0
    container_name: garageon-certbot
    volumes:
      - certbot-webroot:/var/www/certbot
      - letsencrypt:/etc/letsencrypt
    networks:
      - garageon

networks:
  garageon:
    driver: bridge

volumes:
  mysql-data:
  certbot-webroot:
  letsencrypt:
